<!-- Top Navigation Bar (Components/Sidebar converted to TopNav) -->
<header class="top-nav">
    <div class="nav-left">
        <!-- Main Navigation Pills -->
        <nav class="nav-pills">
            <a href="{{ url_for('dashboard_analytics') }}"
                class="nav-item {{ 'active' if request.endpoint == 'dashboard_analytics' else '' }}">
                Dashboard
            </a>
            <a href="{{ url_for('transactions_page') }}"
                class="nav-item {{ 'active' if request.endpoint == 'transactions_page' else '' }}">
                Transactions
            </a>
            <a href="{{ url_for('receipts_page') }}"
                class="nav-item {{ 'active' if request.endpoint == 'receipts_page' else '' }}">
                Receipts
            </a>
            <a href="{{ url_for('wishlist_page') }}"
                class="nav-item {{ 'active' if request.endpoint == 'wishlist_page' else '' }}">
                Wish list
            </a>
        </nav>
    </div>

    <div class="nav-right">
        <!-- Profile Button -->
        <div class="profile-wrapper">
            <button onclick="toggleProfileDropdown()" class="action-btn profile-btn" id="profileMenuBtn" type="button" aria-expanded="false" aria-controls="profileDropdown">
                <span>Profile</span>
            </button>

            <!-- Dropdown -->
            <div id="profileDropdown" class="profile-dropdown">
                <div class="profile-meta">
                    <div class="profile-name">{{ session.get('user_name', 'User') }}
                    </div>
                    <div class="profile-email">{{ session.get('user_email', '') }}</div>
                </div>
                <a href="{{ url_for('logout') }}" class="profile-logout-link">
                    Log Out
                </a>
            </div>
        </div>
    </div>
</header>

<script>
    function toggleProfileDropdown() {
        const d = document.getElementById('profileDropdown');
        const btn = document.getElementById('profileMenuBtn');
        if (!d || !btn) {
            return;
        }
        const shouldOpen = d.style.display !== 'block';
        d.style.display = shouldOpen ? 'block' : 'none';
        btn.setAttribute('aria-expanded', shouldOpen ? 'true' : 'false');
    }

    // Close on outside click
    document.addEventListener('click', function (e) {
        const dropdown = document.getElementById('profileDropdown');
        const btn = document.getElementById('profileMenuBtn');
        if (!dropdown || !btn) {
            return;
        }
        if (!e.target.closest('.profile-wrapper')) {
            dropdown.style.display = 'none';
            btn.setAttribute('aria-expanded', 'false');
        }
    });
</script>
